# DrumscribbleCNN training config
model:
  n_mels: 128
  backbone_dims: [64, 128, 256, 384]
  backbone_depths: [5, 5, 5, 5]
  num_attn_layers: 3
  num_attn_heads: 4

training:
  batch_size: 32
  lr: 0.001
  weight_decay: 0.05
  epochs: 100
  grad_clip: 1.0
  num_workers: 4
  warmup_epochs: 5
  ema_decay: 0.999

data:
  shard_root: ~/Documents/Datasets/build
  datasets:
    - egmd_upload
  shuffle_buffer: 5000

# DrumscribbleCNN training config
model:
  n_mels: 128
  backbone_dims: [64, 128, 256, 384]
  backbone_depths: [5, 5, 5, 5]
  num_attn_layers: 3
  num_attn_heads: 4

training:
  batch_size: 32
  lr: 0.001
  weight_decay: 0.05
  epochs: 100
  grad_clip: 1.0
  num_workers: 4
  warmup_epochs: 5
  ema_decay: 0.999

data:
  backend: parquet  # "parquet" or "webdataset"
  # Parquet backend (default)
  parquet_root: ~/Documents/Datasets/hf_cache
  parquet_datasets:
    - e-gmd-aug
    - star-drums-aug
  # WebDataset backend (fallback)
  shard_root: ~/Documents/Datasets/build
  datasets:
    - egmd_upload
    - star-drums
  shuffle_buffer: 5000
  estimated_samples: 164000  # ~140k E-GMD-Aug + ~24k STAR-Aug; used for scheduler step count
